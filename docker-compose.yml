version: '3.8'

services:
  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  core-service:
    build: ./core-service
    volumes:
      - ./core-service:/app
      - /app/node_modules
    command: npm run dev
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/aegisops
      - JWT_SECRET=your_secret_here
    depends_on:
      - mongo
      
  contract-service:
    build: ./contract-service
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/aegisops
      - JWT_SECRET=your_secret
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev
    depends_on:
      - core-service
      - contract-service

volumes:
  mongo-data:
